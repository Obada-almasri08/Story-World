<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنجازاتي | عالم القصص</title>
  <link rel="icon" type="image/png" href="favicon.png">

  <link rel="stylesheet" href="css/achievements.css">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>

<div class="page">

  <aside class="sidebar">
    <div class="logo-box">
      <img src="images/logo.png" alt="عالم القصص">
      <h2>عالم القصص</h2>
    </div>

    <nav class="menu">
      <a href="home.html"><i class='bx bx-home'></i><span>الرئيسية</span></a>
      <a href="stories.html"><i class='bx bx-book-open'></i><span>القصص</span></a>
      <a href="favorites.html"><i class='bx bx-heart'></i><span>المفضلة</span></a>
      <a class="active" href="achievements.html"><i class='bx bx-trophy'></i><span>إنجازاتي</span></a>
      <a href="messages.html" class="messages-link">
        <i class='bx bx-envelope'></i>
        <span>رسائلي</span>
        <span id="msgCount" class="msg-badge" style="display: none;">0</span>
      </a>
      <a class="logout" href="#" onclick="logout()"><i class='bx bx-log-out'></i><span>تسجيل خروج</span></a>
    </nav>
  </aside>

  <main class="main">
    <div class="page-title">
      <h1>إنجازاتي</h1>
      <p>تابع تقدمك في قراءة القصص.</p>
    </div>

    <section class="achievement-summary">
      <div class="summary-card">
        <i class='bx bx-book-reader'></i>
        <h3><span id="completedCount">0</span> / <span id="totalStories">0</span></h3>
        <p>قصص مكتملة</p>
      </div>

      <div class="summary-card">
        <i class='bx bx-line-chart'></i>
        <h3><span id="avgProgress">0</span>%</h3>
        <p>متوسط التقدم</p>
      </div>
    </section>

    <section class="progress-box">
      <h2>تقدم القصص</h2>
      <div id="achievementsContainer"></div>
    </section>
  </main>

</div>

<script src="js/api.js"></script>
<script src="js/achievements.js?v=2"></script>
</body>
</html>
