<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>القصص | عالم القصص</title>
  <link rel="icon" type="image/png" href="favicon.png">

  <link rel="stylesheet" href="css/stories.css">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>

<div class="page">

  <aside class="sidebar">
    <div class="logo-box">
      <img src="images/logo.png" alt="عالم القصص">
      <h2>عالم القصص</h2>
    </div>

    <nav class="menu">
      <a href="home.html"><i class='bx bx-home'></i><span>الرئيسية</span></a>
      <a class="active" href="stories.html"><i class='bx bx-book-open'></i><span>القصص</span></a>
      <a href="favorites.html"><i class='bx bx-heart'></i><span>المفضلة</span></a>
      <a href="achievements.html"><i class='bx bx-trophy'></i><span>إنجازاتي</span></a>
      <a href="messages.html" class="messages-link">
        <i class='bx bx-envelope'></i>
        <span>رسائلي</span>
        <span id="msgCount" class="msg-badge" style="display: none;">0</span>
      </a>
      <a class="logout" href="#" onclick="logout()"><i class='bx bx-log-out'></i><span>تسجيل خروج</span></a>
    </nav>
  </aside>

  <main class="main">

    <div class="page-title">
      <h1>القصص المتاحة</h1>
      <p>اختر تصنيف القصة ثم ابدأ القراءة</p>
    </div>

    <div class="category-filter">
      <button class="filter-btn active" onclick="filterStories('all', this)">الكل</button>
      <button class="filter-btn" onclick="filterStories('islamic', this)">قصص إسلامية</button>
      <button class="filter-btn" onclick="filterStories('fantasy', this)">قصص خيالية</button>
      <button class="filter-btn" onclick="filterStories('adventure', this)">قصص مغامرات</button>
      <button class="filter-btn" onclick="filterStories('educational', this)">قصص تعليمية</button>
      <button class="filter-btn" onclick="filterStories('animals', this)">قصص حيوانات</button>
    </div>

    <div id="storiesContainer" class="stories"></div>

  </main>

</div>

<script src="js/api.js"></script>
<script src="js/stories.js?v=2"></script>
</body>
</html>
