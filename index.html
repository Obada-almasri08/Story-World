<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | عالم القصص</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<main class="login-page">

  <section class="login-box">

    <img src="images/logo.png" class="logo" alt="شعار عالم القصص">

    <h1>عالم القصص</h1>
    <p>منصة تعليمية لقراءة القصص وتقييم الطلاب</p>

    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة المرور">

    <h3>اختر نوع الحساب</h3>

    <div class="roles">
      <button onclick="selectRole('student', this)">طالب</button>
      <button onclick="selectRole('teacher', this)">معلم</button>
    </div>

    <button class="login-btn" onclick="login()">تسجيل الدخول</button>

    <span class="note">رحلة جديدة تبدأ من قصة</span>
    <p id="message"></p>

  </section>

</main>

<script src="js/api.js"></script>
<script src="js/main.js?v=5"></script>
</body>
</html>
